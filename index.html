<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cekdulu!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a1a;
      --card: #2d2d2d;
      --border: rgba(255,255,255,0.1);
      --accent: #00d4aa;
      --text: #ffffff;
      --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-box { width: 100%; max-width: 380px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 24px; }
    .auth-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 12px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .auth-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .tabs { display: flex; gap: 4px; background: #1f1f1f; padding: 4px; border-radius: 8px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; font-weight: 600; }
    .tab.active { background: var(--card); color: var(--accent); }
    .form { display: none; }
    .form.active { display: block; }
    .input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #1f1f1f; color: var(--text); margin-bottom: 12px; font-size: 14px; }
    .input:focus { outline: none; border-color: var(--accent); }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
    .btn-main { background: var(--accent); color: #000; }
    .btn-wa { background: #25d366; color: #fff; }
    .btn-orange { background: #ff9500; color: #000; }
    .btn-red { background: #ff5c5c; color: #fff; }
    .alert { padding: 10px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; display: none; }
    .alert.show { display: block; }
    .alert-ok { background: rgba(0,212,170,0.15); color: var(--accent); }
    .alert-err { background: rgba(255,92,92,0.15); color: #ff5c5c; }
    .phone-row { display: flex; gap: 6px; }
    .phone-pre { width: 55px; text-align: center; background: #242424; color: var(--muted); }
    .link { color: var(--accent); cursor: pointer; font-size: 13px; }
    .divider { text-align: center; color: var(--muted); font-size: 12px; margin: 12px 0; }
    
    .app-page { display: none; min-height: 100vh; }
    .app-page.show { display: block; }
    .header { background: #242424; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
    .header-title { font-weight: 700; color: #d4c4a8; }
    .badge { background: #ff9500; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 8px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
    .dropdown { position: absolute; top: 50px; right: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: none; min-width: 120px; z-index: 100; }
    .dropdown.open { display: block; }
    .dropdown-item { padding: 10px 14px; cursor: pointer; font-size: 13px; }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .nav { display: flex; gap: 4px; padding: 8px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .nav-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; }
    .nav-btn.on { background: rgba(212,196,168,0.1); border-color: #d4c4a8; color: #d4c4a8; }
    .main { padding: 14px; }
    .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
    .stat { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 14px; }
    .stat-num { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--muted); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); }
    .user-row:last-child { border-bottom: none; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-detail { font-size: 11px; color: var(--muted); }
    .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .status-pending { background: rgba(212,196,168,0.15); color: #d4c4a8; }
    .status-active { background: rgba(0,212,170,0.15); color: var(--accent); }
    .notice { background: var(--card); border: 1px solid #d4c4a8; border-radius: 10px; padding: 14px; }
    .notice-title { font-weight: 600; color: #d4c4a8; margin-bottom: 4px; }
    .notice-text { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .section { display: none; }
    .section.show { display: block; }
    
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal-box { background: var(--card); border-radius: 12px; padding: 20px; max-width: 320px; width: 100%; }
    .modal-title { font-weight: 600; margin-bottom: 10px; color: #d4c4a8; }
    .modal-text { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns .btn { flex: 1; margin: 0; }
    
    @media (min-width: 500px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>

<!-- AUTH PAGE -->
<div class="auth-page" id="authPage">
  <div class="auth-box">
    <div class="auth-logo">✈️</div>
    <h1 class="auth-title font-display">cekdulu!</h1>
    
    <div class="tabs">
      <button class="tab active" id="tabLogin" type="button">Masuk</button>
      <button class="tab" id="tabReg" type="button">Daftar</button>
    </div>
    
    <div class="alert alert-err" id="errMsg"></div>
    <div class="alert alert-ok" id="okMsg"></div>
    
    <!-- LOGIN FORM -->
    <form class="form active" id="loginForm" name="loginForm">
      <label for="loginEmail" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Email</label>
      <input type="email" class="input" id="loginEmail" name="email" placeholder="nama@email.com" required autocomplete="email">
      
      <label for="loginPass" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Password</label>
      <input type="password" class="input" id="loginPass" name="password" placeholder="Password" required autocomplete="current-password">
      
      <button class="btn btn-main" type="submit">Masuk</button>
      
      <div class="divider">atau</div>
      <button class="btn btn-wa" type="button" onclick="openWa()">📞 Hubungi Admin</button>
    </form>
    
    <!-- REGISTER FORM -->
    <form class="form" id="regForm" name="regForm">
      <label for="regName" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Nama Lengkap</label>
      <input type="text" class="input" id="regName" name="fullname" placeholder="Nama lengkap" required autocomplete="name">
      
      <label for="regEmail" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Email</label>
      <input type="email" class="input" id="regEmail" name="email" placeholder="nama@email.com" required autocomplete="email">
      
      <label for="regPhone" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Nomor Telepon</label>
      <div class="phone-row">
        <input class="input phone-pre" value="+62" readonly tabindex="-1">
        <input type="tel" class="input" id="regPhone" name="phone" placeholder="812-xxxx-xxxx" required autocomplete="tel">
      </div>
      
      <label for="regPass" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Password</label>
      <input type="password" class="input" id="regPass" name="password" placeholder="Minimal 8 karakter" required autocomplete="new-password">
      
      <label for="regPass2" style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Konfirmasi Password</label>
      <input type="password" class="input" id="regPass2" name="password2" placeholder="Ulangi password" required autocomplete="new-password">
      
      <button class="btn btn-main" type="submit">Daftar Sekarang</button>
    </form>
  </div>
</div>

<!-- APP PAGE -->
<div class="app-page" id="appPage">
  <div class="header">
    <div style="display:flex;align-items:center">
      <span class="header-title font-display">cekdulu!</span>
      <span class="badge" id="adminBadge" style="display:none">ADMIN</span>
    </div>
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=u" class="avatar" id="avatarImg" alt="Avatar">
    <div class="dropdown" id="drop">
      <div class="dropdown-item" id="logoutBtn">🚪 Logout</div>
    </div>
  </div>
  
  <div class="nav" id="nav"></div>
  
  <div class="main" id="main"></div>
</div>

<!-- LOGOUT MODAL -->
<div class="modal-bg" id="logoutModal">
  <div class="modal-box">
    <div class="modal-title">Logout</div>
    <div class="modal-text">Yakin ingin keluar?</div>
    <div class="modal-btns">
      <button class="btn" style="background:#333" id="cancelLogout">Batal</button>
      <button class="btn btn-red" id="confirmLogout">Logout</button>
    </div>
  </div>
</div>

<!-- ACTIVATE MODAL -->
<div class="modal-bg" id="activateModal">
  <div class="modal-box">
    <div class="modal-title">Aktivasi User</div>
    <div class="modal-text">Aktivasi <b id="activateName"></b>?</div>
    <div class="modal-btns">
      <button class="btn" style="background:#333" id="cancelActivate">Batal</button>
      <button class="btn btn-orange" id="confirmActivate">Aktivasi</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  
  // ========== CONFIG ==========
  var ADMIN_EMAIL = '14summersun@gmail.com';
  var ADMIN_PASS = '14summersun@4dmin';
  var USERS_KEY = 'cekdulu_users';
  var SESS_KEY = 'cekdulu_session';
  
  // ========== STATE ==========
  var me = null;
  var activateId = null;
  
  // ========== DOM ==========
  var authPage = document.getElementById('authPage');
  var appPage = document.getElementById('appPage');
  var tabLogin = document.getElementById('tabLogin');
  var tabReg = document.getElementById('tabReg');
  var loginForm = document.getElementById('loginForm');
  var regForm = document.getElementById('regForm');
  var errMsg = document.getElementById('errMsg');
  var okMsg = document.getElementById('okMsg');
  var nav = document.getElementById('nav');
  var main = document.getElementById('main');
  var avatarImg = document.getElementById('avatarImg');
  var adminBadge = document.getElementById('adminBadge');
  var drop = document.getElementById('drop');
  var logoutBtn = document.getElementById('logoutBtn');
  var logoutModal = document.getElementById('logoutModal');
  var cancelLogout = document.getElementById('cancelLogout');
  var confirmLogoutBtn = document.getElementById('confirmLogout');
  var activateModal = document.getElementById('activateModal');
  var cancelActivate = document.getElementById('cancelActivate');
  var confirmActivateBtn = document.getElementById('confirmActivate');
  var activateNameEl = document.getElementById('activateName');
  
  // ========== HELPERS ==========
  function err(msg) { errMsg.textContent = msg; errMsg.classList.add('show'); }
  function ok(msg) { okMsg.textContent = msg; okMsg.classList.add('show'); }
  function clearMsg() { errMsg.classList.remove('show'); okMsg.classList.remove('show'); }
  
  function getUsers() {
    try {
      var d = localStorage.getItem(USERS_KEY);
      return d ? JSON.parse(d) : [];
    } catch(e) { console.error('getUsers:', e); return []; }
  }
  
  function saveUsers(arr) {
    try { localStorage.setItem(USERS_KEY, JSON.stringify(arr)); return true; }
    catch(e) { console.error('saveUsers:', e); return false; }
  }
  
  function getSess() {
    try { var d = localStorage.getItem(SESS_KEY); return d ? JSON.parse(d) : null; }
    catch(e) { return null; }
  }
  
  function saveSess(u) { try { localStorage.setItem(SESS_KEY, JSON.stringify(u)); } catch(e) {} }
  function clearSess() { localStorage.removeItem(SESS_KEY); }
  
  function openWa() {
    window.open('https://wa.me/6285161990373?text=' + encodeURIComponent('Halo Admin cekdulu!'), '_blank');
  }
  
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }
  
  function showModal(id) {
    document.getElementById(id).classList.add('open');
  }
  
  // ========== INIT ==========
  function init() {
    console.log('=== INIT v2 ===');
    
    var s = getSess();
    if (s && s.email) {
      console.log('Session:', s.email);
      me = s;
      showApp();
      return;
    }
    
    authPage.style.display = 'flex';
  }
  
  // ========== TABS ==========
  tabLogin.onclick = function() {
    this.classList.add('active');
    tabReg.classList.remove('active');
    loginForm.classList.add('active');
    regForm.classList.remove('active');
    clearMsg();
  };
  
  tabReg.onclick = function() {
    this.classList.add('active');
    tabLogin.classList.remove('active');
    regForm.classList.add('active');
    loginForm.classList.remove('active');
    clearMsg();
  };
  
  // ========== LOGIN ==========
  loginForm.onsubmit = function(e) {
    e.preventDefault();
    clearMsg();
    
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPass').value;
    
    if (!email || !pass) { err('Email dan password wajib'); return; }
    
    console.log('Login:', email);
    
    // Admin
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
      console.log('ADMIN LOGIN OK');
      me = { name: 'Admin', email: email, isAdmin: true, active: true };
      saveSess(me);
      ok('Login Admin berhasil!');
      setTimeout(showApp, 400);
      return;
    }
    
    // User
    var users = getUsers();
    var found = null;
    for (var i = 0; i < users.length; i++) {
      if (users[i].email === email) { found = users[i]; break; }
    }
    
    if (found) {
      console.log('Found:', found.name, 'active:', found.active);
      if (!found.active) {
        err('❌ Belum aktif. wa.me/6285161990373');
      } else {
        me = { name: found.name, email: found.email, isAdmin: false, active: true };
        saveSess(me);
        ok('Login berhasil!');
        setTimeout(showApp, 400);
      }
    } else {
      console.log('NOT found');
      err('❌ Email tidak terdaftar');
    }
  };
  
  // ========== REGISTER ==========
  regForm.onsubmit = function(e) {
    e.preventDefault();
    clearMsg();
    
    var name = document.getElementById('regName').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var pass = document.getElementById('regPass').value;
    var pass2 = document.getElementById('regPass2').value;
    
    if (!name || name.length < 3) { err('Nama min 3 karakter'); return; }
    if (!email) { err('Email wajib'); return; }
    if (!phone) { err('Telepon wajib'); return; }
    if (pass.length < 8) { err('Password min 8 karakter'); return; }
    if (pass !== pass2) { err('Password tidak cocok'); return; }
    
    var users = getUsers();
    
    for (var i = 0; i < users.length; i++) {
      if (users[i].email === email) { err('Email sudah terdaftar'); return; }
    }
    
    var nu = {
      id: Date.now(),
      name: name,
      email: email,
      phone: '+62' + phone.replace(/[^0-9]/g, ''),
      active: false,
      created: new Date().toISOString()
    };
    
    users.push(nu);
    saveUsers(users);
    
    console.log('REGISTER:', nu.email);
    ok('✅ BERHASIL! Email: ' + email + ' | wa.me/6285161990373');
    regForm.reset();
  };
  
  // Phone format
  document.getElementById('regPhone').oninput = function(e) {
    var v = e.target.value.replace(/[^0-9]/g, '');
    if (v.length > 12) v = v.substring(0, 12);
    e.target.value = v;
  };
  
  // ========== SHOW APP ==========
  function showApp() {
    authPage.style.display = 'none';
    appPage.classList.add('show');
    
    avatarImg.src = 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(me.name || 'x');
    adminBadge.style.display = me.isAdmin ? 'inline' : 'none';
    
    renderNav();
    renderMain();
  }
  
  function renderNav() {
    if (me.isAdmin) {
      nav.innerHTML = '<button class="nav-btn on" data-sec="dash">📊 Dashboard</button><button class="nav-btn" data-sec="users">👥 Users</button>';
    } else {
      nav.innerHTML = '<button class="nav-btn on" data-sec="dash">Dashboard</button><button class="nav-btn" data-sec="contacts">Kontak</button><button class="nav-btn" data-sec="create">Buat Pesan</button>';
    }
    
    var btns = nav.querySelectorAll('.nav-btn');
    btns.forEach(function(b) {
      b.onclick = function() {
        btns.forEach(function(x) { x.classList.remove('on'); });
        this.classList.add('on');
        showSec(this.getAttribute('data-sec'));
      };
    });
  }
  
  function showSec(name) {
    main.querySelectorAll('.section').forEach(function(s) { s.classList.remove('show'); });
    var sec = document.getElementById(name + 'Sec');
    if (sec) sec.classList.add('show');
  }
  
  function renderMain() {
    if (me.isAdmin) {
      main.innerHTML = '<div class="section show" id="dashSec"></div><div class="section" id="usersSec"></div>';
    } else {
      main.innerHTML = '<div class="section show" id="dashSec"></div><div class="section" id="contactsSec"></div><div class="section" id="createSec"></div>';
    }
    fillDash();
  }
  
  function fillDash() {
    var dashSec = document.getElementById('dashSec');
    var usersSec = document.getElementById('usersSec');
    
    if (me.isAdmin) {
      var users = getUsers();
      var total = users.length;
      var pending = 0, active = 0;
      for (var i = 0; i < users.length; i++) {
        if (users[i].active) active++; else pending++;
      }
      
      console.log('Dash: Total=' + total + ' Pending=' + pending);
      
      var plist = '';
      for (var i = 0; i < users.length; i++) {
        if (!users[i].active) {
          var u = users[i];
          var dt = u.created ? new Date(u.created).toLocaleDateString('id-ID') : '-';
          plist += '<div class="user-row">' +
            '<img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(u.name) + '">' +
            '<div class="user-info"><div class="user-name">' + u.name + '</div>' +
            '<div class="user-detail">📧 ' + u.email + ' | 📱 ' + (u.phone || '-') + ' | 📅 ' + dt + '</div></div>' +
            '<button class="btn btn-orange" style="width:auto;padding:6px 12px;font-size:11px" data-act="' + u.id + '">✓ Aktivasi</button></div>';
        }
      }
      if (!plist) plist = '<p style="color:var(--muted);font-size:12px">✅ Tidak ada pending.</p>';
      
      dashSec.innerHTML = 
        '<div class="stats">' +
        '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">👥 Total</div></div>' +
        '<div class="stat"><div class="stat-num">' + pending + '</div><div class="stat-label">⏳ Pending</div></div>' +
        '<div class="stat"><div class="stat-num">' + active + '</div><div class="stat-label">✅ Aktif</div></div>' +
        '<div class="stat"><div class="stat-num">Rp 0</div><div class="stat-label">💰 Saldo</div></div>' +
        '</div>' +
        '<div class="card"><h3 style="font-size:14px;margin-bottom:10px;color:#d4c4a8">⏳ Menunggu Aktivasi</h3>' + plist + '</div>';
      
      // Bind activate buttons
      dashSec.querySelectorAll('[data-act]').forEach(function(b) {
        b.onclick = function() {
          activateId = parseInt(this.getAttribute('data-act'));
          for (var i = 0; i < users.length; i++) {
            if (users[i].id === activateId) { activateNameEl.textContent = users[i].name; break; }
          }
          showModal('activateModal');
        };
      });
      
      // Users section
      var ulist = '';
      for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var dt = u.created ? new Date(u.created).toLocaleDateString('id-ID') : '-';
        var st = u.active ? '<span class="status status-active">Aktif</span>' : '<span class="status status-pending">Pending</span>';
        ulist += '<div class="user-row">' +
          '<img class="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(u.name) + '">' +
          '<div class="user-info"><div class="user-name">' + u.name + '</div>' +
          '<div class="user-detail">📧 ' + u.email + ' | 📱 ' + (u.phone || '-') + ' | 📅 ' + dt + '</div></div>' + st + '</div>';
      }
      if (!ulist) ulist = '<p style="color:var(--muted)">Belum ada user</p>';
      
      usersSec.innerHTML = '<div class="card"><h3 style="font-size:15px;margin-bottom:10px;color:#d4c4a8">👥 Daftar User (' + users.length + ')</h3><div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">' + ulist + '</div></div>';
      
    } else {
      // User dashboard
      var st = me.active ? '<span class="status status-active">Aktif</span>' : '';
      var notice = me.active ? '' : '<div class="notice"><div class="notice-title">⚠️ Akun Belum Aktif</div><div class="notice-text">Hubungi admin.</div><button class="btn btn-wa" style="width:auto" onclick="openWa()">📞 Hubungi Admin</button></div>';
      
      dashSec.innerHTML = 
        '<div class="card" style="text-align:center">' +
        '<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(me.name) + '" style="width:64px;height:64px;border-radius:50%;margin-bottom:10px">' +
        '<h2 style="font-size:18px;margin-bottom:4px">' + me.name + '</h2>' +
        '<p style="color:var(--muted);font-size:13px">' + me.email + '</p>' + st + '</div>' + notice;
      
      var contactsSec = document.getElementById('contactsSec');
      if (contactsSec) contactsSec.innerHTML = '<div class="card"><h3 style="color:#d4c4a8">📇 Kontak</h3><p style="color:var(--muted);margin-top:8px;font-size:13px">5 kontak contoh</p></div>';
      
      var createSec = document.getElementById('createSec');
      if (createSec) createSec.innerHTML = '<div class="card"><h3 style="color:#d4c4a8">✉️ Buat Pesan</h3><p style="color:var(--muted);margin-top:8px;font-size:13px">Coming soon</p></div>';
    }
  }
  
  // ========== ACTIVATE ==========
  confirmActivateBtn.onclick = function() {
    if (!activateId) return;
    var users = getUsers();
    for (var i = 0; i < users.length; i++) {
      if (users[i].id === activateId) { users[i].active = true; console.log('Activated:', users[i].email); break; }
    }
    saveUsers(users);
    activateId = null;
    closeModal('activateModal');
    fillDash();
  };
  
  cancelActivate.onclick = function() { closeModal('activateModal'); };
  
  // ========== LOGOUT ==========
  avatarImg.onclick = function() { drop.classList.toggle('open'); };
  
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.avatar') && !e.target.closest('.dropdown')) drop.classList.remove('open');
  });
  
  logoutBtn.onclick = function() { drop.classList.remove('open'); showModal('logoutModal'); };
  cancelLogout.onclick = function() { closeModal('logoutModal'); };
  
  confirmLogoutBtn.onclick = function() {
    closeModal('logoutModal');
    clearSess();
    me = null;
    appPage.classList.remove('show');
    authPage.style.display = 'flex';
  };
  
  // ========== RUN ==========
  init();
  
  console.log('=== LOADED v2 ===');
})();
</script>

</body>
</html>
