<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cekdulu!</title>
  <!-- Tailwind CDN - OK untuk testing, nanti ganti ke production -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-card: #2d2d2d;
      --bg-input: #1f1f1f;
      --card-border: rgba(255,255,255,0.08);
      --accent: #00d4aa;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #707070;
      --danger: #ff5c5c;
      --success: #00d4aa;
      --whatsapp: #25d366;
      --cream: #d4c4a8;
      --admin: #ff9500;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); min-height: 100vh; color: var(--text-primary); }
    .font-display { font-family: 'Space Grotesk', sans-serif; }

    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container.hidden { display: none; }
    .auth-card { width: 100%; max-width: 400px; background: var(--bg-card); border-radius: 18px; border: 1px solid var(--card-border); overflow: hidden; }
    .auth-header { padding: 26px 26px 18px; text-align: center; border-bottom: 1px solid var(--card-border); }
    .auth-logo { width: 48px; height: 48px; margin: 0 auto 10px; background: linear-gradient(135deg, var(--accent), #00a888); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .auth-subtitle { font-size: 12px; color: var(--text-secondary); }
    .auth-body { padding: 18px 26px 26px; }
    .auth-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: 10px; margin-bottom: 18px; }
    .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; }
    .auth-tab.active { background: var(--bg-card); color: var(--accent); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
    .form-input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--bg-input); color: var(--text-primary); font-size: 14px; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-error { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .phone-input-group { display: flex; gap: 6px; }
    .phone-prefix { width: 55px; text-align: center; background: var(--bg-secondary); color: var(--text-secondary); }

    .password-wrapper { position: relative; }
    .password-input { padding-right: 38px !important; }
    .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }

    .btn { width: 100%; padding: 12px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #00a888); color: var(--bg-primary); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-whatsapp { background: var(--whatsapp); color: white; }
    .btn-admin { background: var(--admin); color: var(--bg-primary); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 11px; width: auto; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--card-border); }

    .divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; color: var(--text-muted); font-size: 11px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }
    .auth-footer { text-align: center; padding-top: 12px; }
    .auth-link { color: var(--accent); font-size: 12px; font-weight: 500; cursor: pointer; }

    .alert { padding: 10px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 14px; display: none; }
    .alert.show { display: flex; align-items: center; gap: 8px; }
    .alert-success { background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.2); color: var(--success); }
    .alert-error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.2); color: var(--danger); }
    .spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .app-layout { display: none; min-height: 100vh; flex-direction: column; }
    .app-layout.active { display: flex; }
    .app-header { background: var(--bg-secondary); border-bottom: 1px solid var(--card-border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-title { font-size: 16px; font-weight: 700; color: var(--cream); }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .admin-badge { background: var(--admin); color: var(--bg-primary); padding: 3px 8px; border-radius: 16px; font-size: 10px; font-weight: 700; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
    .avatar-dropdown { position: absolute; top: 52px; right: 14px; min-width: 130px; background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 10px; display: none; overflow: hidden; z-index: 200; }
    .avatar-dropdown.active { display: block; }
    .dropdown-item { padding: 10px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .dropdown-item.danger { color: var(--danger); border-top: 1px solid var(--card-border); }
    .nav-menu { display: flex; gap: 4px; padding: 6px 14px; background: var(--bg-primary); border-bottom: 1px solid var(--card-border); overflow-x: auto; }
    .nav-item { padding: 6px 12px; border-radius: 6px; background: transparent; border: 1px solid transparent; color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .nav-item.active { background: rgba(212,196,168,0.1); border-color: var(--cream); color: var(--cream); }
    .nav-item.admin-nav.active { background: rgba(255,149,0,0.1); border-color: var(--admin); color: var(--admin); }
    .app-main { flex: 1; padding: 14px; }
    .section-container { display: none; }
    .section-container.active { display: block; }
    .profile-card { background: var(--bg-card); border-radius: 14px; border: 1px solid var(--card-border); padding: 18px; margin-bottom: 14px; }
    .profile-header { text-align: center; margin-bottom: 16px; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 10px; }
    .profile-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .profile-email { font-size: 12px; color: var(--text-secondary); }
    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 16px; font-size: 10px; font-weight: 600; border: 1px solid; }
    .status-active { background: rgba(0,212,170,0.1); border-color: var(--success); color: var(--success); }
    .status-inactive { background: rgba(212,196,168,0.1); border-color: var(--cream); color: var(--cream); }

    .notification-box { background: var(--bg-card); border-radius: 14px; border: 1px solid var(--cream); padding: 14px; margin-bottom: 14px; }
    .notification-content { display: flex; align-items: center; gap: 10px; }
    .notification-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(212,196,168,0.15); color: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .notification-text { flex: 1; }
    .notification-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; color: var(--cream); }
    .notification-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--card-border); padding: 14px; }
    .stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 14px; }
    .stat-icon.users { background: rgba(255,149,0,0.15); }
    .stat-icon.pending { background: rgba(255,184,77,0.15); }
    .stat-icon.balance { background: rgba(0,212,170,0.15); }
    .stat-value { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .stat-label { font-size: 10px; color: var(--text-secondary); }

    .user-list { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--card-border); overflow: hidden; }
    .user-list-header { padding: 10px 14px; background: var(--bg-secondary); border-bottom: 1px solid var(--card-border); font-size: 12px; font-weight: 600; color: var(--cream); }
    .user-list-body { max-height: 350px; overflow-y: auto; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--card-border); }
    .user-item:last-child { border-bottom: none; }
    .user-item-avatar { width: 36px; height: 36px; border-radius: 50%; }
    .user-item-info { flex: 1; min-width: 0; }
    .user-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .user-item-detail { font-size: 11px; color: var(--text-muted); }
    .user-item-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-overlay.active { display: flex; }
    .modal-content { width: 100%; max-width: 340px; background: var(--bg-card); border-radius: 14px; border: 1px solid var(--card-border); max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 16px 18px; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--cream); }
    .modal-close { width: 26px; height: 26px; border-radius: 50%; background: transparent; border: 1px solid var(--cream); color: var(--cream); cursor: pointer; font-size: 16px; }
    .modal-body { padding: 16px 18px; }
    .modal-footer { padding: 12px 18px 18px; display: flex; gap: 8px; }
    .modal-footer .btn { flex: 1; }

    .empty-state { padding: 24px 14px; text-align: center; color: var(--text-muted); font-size: 13px; }

    @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>
  <!-- AUTH -->
  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">✈️</div>
        <h1 class="auth-title font-display">cekdulu!</h1>
        <p class="auth-subtitle">Kirim pesan ke Telegram, Email & SMS</p>
      </div>
      <div class="auth-body">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
          <button class="auth-tab" onclick="switchTab('register')">Daftar</button>
        </div>
        <div class="alert alert-error" id="alertError"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="nama@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-input password-input" id="loginPassword" placeholder="Password" required>
              <button type="button" class="password-toggle" onclick="togglePw('loginPassword')">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">Masuk</button>
          <div class="divider">atau</div>
          <button type="button" class="btn btn-whatsapp" onclick="contactAdmin()">📞 Hubungi Admin</button>
          <div class="auth-footer"><a class="auth-link" onclick="alert('Hubungi admin untuk reset password')">Lupa Password?</a></div>
        </form>

        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-input" id="regName" placeholder="Nama lengkap" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="regEmail" placeholder="nama@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nomor Telepon</label>
            <div class="phone-input-group">
              <input type="text" class="form-input phone-prefix" value="+62" readonly>
              <input type="tel" class="form-input" id="regPhone" placeholder="812-xxxx-xxxx" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-input password-input" id="regPassword" placeholder="Minimal 8 karakter" required>
              <button type="button" class="password-toggle" onclick="togglePw('regPassword')">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Konfirmasi Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-input password-input" id="regPassword2" placeholder="Ulangi password" required>
              <button type="button" class="password-toggle" onclick="togglePw('regPassword2')">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="regBtn">Daftar Sekarang</button>
          <div class="auth-footer">Sudah punya akun? <a class="auth-link" onclick="switchTab('login')">Masuk</a></div>
        </form>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app-layout" id="appLayout">
    <header class="app-header">
      <div class="header-left">
        <div class="header-title font-display">cekdulu!</div>
        <div class="admin-badge" id="adminBadge" style="display:none">ADMIN</div>
      </div>
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=demo" class="user-avatar" id="headerAvatar" onclick="toggleDropdown()">
      <div class="avatar-dropdown" id="dropdown">
        <div class="dropdown-item danger" onclick="logout()">🚪 Logout</div>
      </div>
    </header>
    <nav class="nav-menu" id="navMenu"></nav>
    <main class="app-main" id="appMain"></main>
  </div>

  <!-- MODALS -->
  <div class="modal-overlay" id="modalLogout"><div class="modal-content"><div class="modal-header"><h3 class="modal-title">Logout</h3><button class="modal-close" onclick="closeModal('logout')">×</button></div><div class="modal-body"><p style="font-size:13px;color:var(--text-secondary)">Yakin ingin keluar?</p></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('logout')">Batal</button><button class="btn btn-danger" onclick="doLogout()">Logout</button></div></div></div>
  <div class="modal-overlay" id="modalActivate"><div class="modal-content"><div class="modal-header"><h3 class="modal-title">Aktivasi User</h3><button class="modal-close" onclick="closeModal('activate')">×</button></div><div class="modal-body"><p style="font-size:13px;color:var(--text-secondary)">Aktivasi <strong id="activateName"></strong>?</p></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('activate')">Batal</button><button class="btn btn-admin" onclick="confirmActivate()">Aktivasi</button></div></div></div>

  <script>
    // ===================== CONFIG =====================
    var ADMIN_EMAIL = '14summersun@gmail.com';
    var ADMIN_PASSWORD = '14summersun@4dmin';
    var STORAGE_KEY = 'cekdulu_users';
    var SESSION_KEY = 'cekdulu_session';

    // ===================== STATE =====================
    var user = { name: '', email: '', isAdmin: false, active: false };
    var activateUserId = null;

    // ===================== UTILS =====================
    function log(msg) { console.log('[cekdulu]', msg); }

    // ===================== STORAGE =====================
    function getUsers() {
      try {
        var data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch(e) { return []; }
    }

    function saveUsers(users) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); return true; }
      catch(e) { return false; }
    }

    function getSession() {
      try {
        var data = localStorage.getItem(SESSION_KEY);
        return data ? JSON.parse(data) : null;
      } catch(e) { return null; }
    }

    function saveSession(u) {
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
      catch(e) {}
    }

    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    // ===================== INIT =====================
    function init() {
      log('Init...');
      var session = getSession();
      if (session && session.email) {
        log('Session found: ' + session.email);
        user = session;
        showApp();
      }
    }
    init();

    // ===================== AUTH UI =====================
    function switchTab(t) {
      document.querySelectorAll('.auth-tab').forEach(function(b, i) {
        b.classList.toggle('active', (i === 0 && t === 'login') || (i === 1 && t === 'register'));
      });
      document.getElementById('loginForm').classList.toggle('active', t === 'login');
      document.getElementById('registerForm').classList.toggle('active', t === 'register');
      hideAlerts();
    }

    function togglePw(id) {
      var inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showAlert(type, msg) {
      hideAlerts();
      var el = document.getElementById('alert' + (type === 'error' ? 'Error' : 'Success'));
      el.innerHTML = (type === 'error' ? '❌ ' : '✅ ') + msg;
      el.classList.add('show');
    }

    function hideAlerts() { document.querySelectorAll('.alert').forEach(function(e) { e.classList.remove('show'); }); }

    function contactAdmin() { window.open('https://wa.me/6285161990373?text=' + encodeURIComponent('Halo Admin cekdulu!'), '_blank'); }

    // ===================== LOGIN =====================
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      hideAlerts();
      
      var email = document.getElementById('loginEmail').value.trim();
      var pass = document.getElementById('loginPassword').value;
      var btn = document.getElementById('loginBtn');

      if (!email || !pass) { showAlert('error', 'Email dan password wajib'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      setTimeout(function() {
        // Check Admin
        if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
          log('Login as ADMIN');
          user = { name: 'Admin', email: email, isAdmin: true, active: true };
          saveSession(user);
          showAlert('success', 'Login Admin berhasil!');
          setTimeout(showApp, 400);
        } else {
          // Check User
          var users = getUsers();
          var found = null;
          for (var i = 0; i < users.length; i++) {
            if (users[i].email === email) { found = users[i]; break; }
          }

          if (found) {
            log('User found: ' + found.name + ', active: ' + found.active);
            if (!found.active) {
              showAlert('error', 'Akun belum aktif. Hubungi: wa.me/6285161990373');
            } else {
              user = { name: found.name, email: found.email, isAdmin: false, active: true };
              saveSession(user);
              showAlert('success', 'Login berhasil!');
              setTimeout(showApp, 400);
            }
          } else {
            log('User NOT found');
            showAlert('error', 'Email tidak terdaftar. Silakan daftar dulu.');
          }
        }
        btn.disabled = false;
        btn.innerHTML = 'Masuk';
      }, 600);
    };

    // ===================== REGISTER =====================
    document.getElementById('registerForm').onsubmit = function(e) {
      e.preventDefault();
      hideAlerts();

      var name = document.getElementById('regName').value.trim();
      var email = document.getElementById('regEmail').value.trim();
      var phone = document.getElementById('regPhone').value.trim();
      var pass = document.getElementById('regPassword').value;
      var pass2 = document.getElementById('regPassword2').value;
      var btn = document.getElementById('regBtn');

      if (!name || name.length < 3) { showAlert('error', 'Nama minimal 3 karakter'); return; }
      if (!email) { showAlert('error', 'Email wajib'); return; }
      if (!phone) { showAlert('error', 'Telepon wajib'); return; }
      if (pass.length < 8) { showAlert('error', 'Password minimal 8 karakter'); return; }
      if (pass !== pass2) { showAlert('error', 'Password tidak cocok'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      setTimeout(function() {
        var users = getUsers();
        
        // Check exists
        for (var i = 0; i < users.length; i++) {
          if (users[i].email === email) {
            showAlert('error', 'Email sudah terdaftar');
            btn.disabled = false;
            btn.innerHTML = 'Daftar Sekarang';
            return;
          }
        }

        // Add new
        var newUser = {
          id: Date.now(),
          name: name,
          email: email,
          phone: '+62 ' + phone.replace(/[^0-9]/g, ''),
          active: false,
          createdAt: new Date().toISOString()
        };

        users.push(newUser);
        saveUsers(users);
        log('Registered: ' + email + '. Total users: ' + users.length);

        showAlert('success', '✅ Berhasil daftar!\n\n📧 ' + email + '\n\n🔔 Aktivasi via:\nwa.me/6285161990373');
        document.getElementById('registerForm').reset();
        btn.disabled = false;
        btn.innerHTML = 'Daftar Sekarang';
      }, 800);
    };

    // Phone format
    document.getElementById('regPhone').oninput = function(e) {
      var v = e.target.value.replace(/[^0-9]/g, '');
      if (v.length > 12) v = v.substring(0, 12);
      e.target.value = v;
    };

    // ===================== APP =====================
    function showApp() {
      log('showApp as Admin: ' + user.isAdmin);
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('appLayout').classList.add('active');
      renderNav();
      renderMain();
    }

    function renderNav() {
      var nav = document.getElementById('navMenu');
      if (user.isAdmin) {
        nav.innerHTML = 
          '<button class="nav-item admin-nav active" data-sec="dashboard">📊 Dashboard</button>' +
          '<button class="nav-item admin-nav" data-sec="users">👥 Users</button>';
      } else {
        nav.innerHTML = 
          '<button class="nav-item active" data-sec="dashboard">Dashboard</button>' +
          '<button class="nav-item" data-sec="contacts">Kontak</button>' +
          '<button class="nav-item" data-sec="create">Buat Pesan</button>';
      }
      
      // Add click handlers
      document.querySelectorAll('.nav-item').forEach(function(btn) {
        btn.onclick = function() { nav(this.getAttribute('data-sec')); };
      });
    }

    function nav(sec) {
      document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.nav-item[data-sec="' + sec + '"]').classList.add('active');
      
      document.querySelectorAll('.section-container').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('sec' + sec.charAt(0).toUpperCase() + sec.slice(1)).classList.add('active');
    }

    function renderMain() {
      var main = document.getElementById('appMain');
      log('renderMain - isAdmin: ' + user.isAdmin);
      
      if (user.isAdmin) {
        main.innerHTML = 
          '<div class="section-container active" id="secDashboard">' + renderAdminDash() + '</div>' +
          '<div class="section-container" id="secUsers">' + renderUsers() + '</div>';
      } else {
        main.innerHTML = 
          '<div class="section-container active" id="secDashboard">' + renderUserDash() + '</div>' +
          '<div class="section-container" id="secContacts"><div class="profile-card"><h3 style="color:var(--cream)">📇 Kontak</h3><p style="color:var(--text-secondary);margin-top:8px;font-size:13px">5 kontak contoh tersedia</p></div></div>' +
          '<div class="section-container" id="secCreate"><div class="profile-card"><h3 style="color:var(--cream)">✉️ Buat Pesan</h3><p style="color:var(--text-secondary);margin-top:8px;font-size:13px">Fitur coming soon...</p></div></div>';
      }

      document.getElementById('headerAvatar').src = 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(user.name || 'demo');
      document.getElementById('adminBadge').style.display = user.isAdmin ? 'inline-flex' : 'none';
    }

    function renderAdminDash() {
      var users = getUsers();
      var total = users.length;
      var pending = 0, active = 0;
      
      for (var i = 0; i < users.length; i++) {
        if (users[i].active) active++; else pending++;
      }

      log('AdminDash - Total: ' + total + ', Pending: ' + pending);

      return '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-icon users">👥</div><div class="stat-value">' + total + '</div><div class="stat-label">Total User</div></div>' +
        '<div class="stat-card"><div class="stat-icon pending">⏳</div><div class="stat-value">' + pending + '</div><div class="stat-label">Pending</div></div>' +
        '<div class="stat-card"><div class="stat-icon balance">✅</div><div class="stat-value">' + active + '</div><div class="stat-label">Aktif</div></div>' +
        '<div class="stat-card"><div class="stat-icon balance">💰</div><div class="stat-value">Rp 0</div><div class="stat-label">Saldo</div></div>' +
      '</div>' +
      '<div class="profile-card"><h3 style="font-size:14px;margin-bottom:10px;color:var(--cream)">⏳ Menunggu Aktivasi</h3>' + renderPending() + '</div>';
    }

    function renderPending() {
      var users = getUsers();
      var list = '';
      for (var i = 0; i < users.length; i++) {
        if (!users[i].active) {
          var u = users[i];
          var date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('id-ID') : '-';
          list += '<div class="user-item">' +
            '<img class="user-item-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(u.name) + '">' +
            '<div class="user-item-info">' +
              '<div class="user-item-name">' + u.name + '</div>' +
              '<div class="user-item-detail">📧 ' + u.email + ' | 📱 ' + (u.phone || '-') + '</div>' +
              '<div class="user-item-date">📅 ' + date + '</div>' +
            '</div>' +
            '<button class="btn btn-admin btn-sm" onclick="activateUser(' + u.id + ')">✓ Aktivasi</button>' +
          '</div>';
        }
      }
      return list || '<p style="color:var(--text-secondary);font-size:12px">✅ Tidak ada user menunggu.</p>';
    }

    function renderUsers() {
      var users = getUsers();
      if (users.length === 0) return '<div class="profile-card"><div class="empty-state">📭 Belum ada user</div></div>';

      var html = '<div class="profile-card"><h3 style="font-size:15px;margin-bottom:10px;color:var(--cream)">👥 Daftar User (' + users.length + ')</h3><div class="user-list"><div class="user-list-header">Semua User</div><div class="user-list-body">';
      
      for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('id-ID') : '-';
        var status = u.active ? '<span class="status-badge status-active">Aktif</span>' : '<span class="status-badge status-inactive">Pending</span>';
        html += '<div class="user-item">' +
          '<img class="user-item-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(u.name) + '">' +
          '<div class="user-item-info">' +
            '<div class="user-item-name">' + u.name + '</div>' +
            '<div class="user-item-detail">📧 ' + u.email + ' | 📱 ' + (u.phone || '-') + '</div>' +
            '<div class="user-item-date">📅 ' + date + '</div>' +
          '</div>' + status +
        '</div>';
      }
      return html + '</div></div></div>';
    }

    function renderUserDash() {
      var status = user.active ? '<span class="status-badge status-active" style="margin-top:8px">Aktif</span>' : '';
      var notice = user.active ? '' : '<div class="notification-box"><div class="notification-content"><div class="notification-icon">⚠️</div><div class="notification-text"><div class="notification-title">Akun Belum Aktif</div><div class="notification-desc">Hubungi admin untuk aktivasi.</div><button class="btn btn-whatsapp btn-sm" onclick="contactAdmin()">📞 Hubungi Admin</button></div></div></div>';
      
      return '<div class="profile-card">' +
        '<div class="profile-header">' +
          '<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(user.name) + '" class="profile-avatar">' +
          '<h2 class="profile-name font-display">' + user.name + '</h2>' +
          '<p class="profile-email">' + user.email + '</p>' + status +
        '</div>' +
      '</div>' + notice;
    }

    function activateUser(id) {
      activateUserId = id;
      var users = getUsers();
      for (var i = 0; i < users.length; i++) {
        if (users[i].id === id) { document.getElementById('activateName').textContent = users[i].name; break; }
      }
      openModal('activate');
    }

    function confirmActivate() {
      if (!activateUserId) return;
      var users = getUsers();
      for (var i = 0; i < users.length; i++) {
        if (users[i].id === activateUserId) { users[i].active = true; log('Activated: ' + users[i].email); break; }
      }
      saveUsers(users);
      activateUserId = null;
      closeModal('activate');
      renderMain(); // Re-render to update counts
    }

    // ===================== MODALS =====================
    function openModal(n) { var m = document.getElementById('modal' + n.charAt(0).toUpperCase() + n.slice(1)); if (m) m.classList.add('active'); }
    function closeModal(n) { var m = document.getElementById('modal' + n.charAt(0).toUpperCase() + n.slice(1)); if (m) m.classList.remove('active'); }

    // ===================== DROPDOWN =====================
    function toggleDropdown() { document.getElementById('dropdown').classList.toggle('active'); }
    document.addEventListener('click', function(e) { var d = document.getElementById('dropdown'); if (!d.contains(e.target) && e.target.id !== 'headerAvatar') d.classList.remove('active'); });

    // ===================== LOGOUT =====================
    function logout() { openModal('logout'); }
    function doLogout() { closeModal('logout'); clearSession(); user = { name: '', email: '', isAdmin: false, active: false }; document.getElementById('appLayout').classList.remove('active'); document.getElementById('authContainer').classList.remove('hidden'); }

    log('Script ready');
  </script>
</body>
</html>
