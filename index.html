<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Message Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c1015;
      --bg-secondary: #141a22;
      --bg-card: #1a222d;
      --bg-input: #0f1419;
      --card-border: rgba(255, 255, 255, 0.06);
      --accent: #00d4aa;
      --accent-dim: #00a888;
      --accent-glow: rgba(0, 212, 170, 0.2);
      --text-primary: #f0f4f8;
      --text-secondary: #8892a0;
      --text-muted: #5c6672;
      --danger: #ff5c5c;
      --warning: #ffb84d;
      --success: #00d4aa;
      --whatsapp: #25d366;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }

    .font-display { font-family: 'Space Grotesk', sans-serif; }

    /* Background */
    .bg-atmosphere {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 212, 170, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 136, 204, 0.03) 0%, transparent 50%),
        var(--bg-primary);
      z-index: -1;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    /* Auth Container */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border-radius: 24px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .auth-header {
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-body {
      padding: 24px 32px 32px;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .auth-tab:hover {
      color: var(--text-primary);
    }

    .auth-tab.active {
      background: var(--bg-card);
      color: var(--accent);
    }

    /* Form */
    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255, 92, 92, 0.15);
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    /* Phone Input */
    .phone-input-group {
      display: flex;
      gap: 8px;
    }

    .phone-prefix {
      width: 70px;
      text-align: center;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    /* Password Toggle */
    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    .btn-whatsapp {
      background: var(--whatsapp);
      color: white;
    }

    .btn-whatsapp:hover {
      background: #20bd5a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    /* Footer Links */
    .auth-footer {
      text-align: center;
      padding-top: 16px;
    }

    .auth-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .auth-link:hover {
      text-decoration: underline;
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-error {
      background: rgba(255, 92, 92, 0.1);
      border: 1px solid rgba(255, 92, 92, 0.2);
      color: var(--danger);
    }

    .alert-warning {
      background: rgba(255, 184, 77, 0.1);
      border: 1px solid rgba(255, 184, 77, 0.2);
      color: var(--warning);
    }

    .alert-success {
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.2);
      color: var(--success);
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Forgot Password Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border-radius: 20px;
      border: 1px solid var(--card-border);
      transform: scale(0.95);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-body {
      padding: 20px 24px;
    }

    .modal-footer {
      padding: 16px 24px 24px;
      display: flex;
      gap: 10px;
    }

    .modal-footer .btn {
      flex: 1;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        border-radius: 16px;
      }
      
      .auth-header {
        padding: 24px 24px 20px;
      }
      
      .auth-body {
        padding: 20px 24px 24px;
      }
      
      .auth-title {
        font-size: 20px;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-atmosphere"></div>
  <div class="bg-grid"></div>

  <div class="auth-container">
    <div class="auth-card">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </div>
        <h1 class="auth-title font-display">Message Platform</h1>
        <p class="auth-subtitle">Kirim pesan ke Telegram, Email & SMS</p>
      </div>

      <!-- Body -->
      <div class="auth-body">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Masuk</button>
          <button class="auth-tab" data-tab="register">Daftar</button>
        </div>

        <!-- Alert Container -->
        <div class="alert alert-error" id="alertError"></div>
        <div class="alert alert-warning" id="alertWarning"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <input 
              type="email" 
              class="form-input" 
              id="loginEmail" 
              placeholder="nama@email.com"
              required
              autocomplete="email"
            >
            <div class="form-error" id="loginEmailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="password-wrapper">
              <input 
                type="password" 
                class="form-input" 
                id="loginPassword" 
                placeholder="Masukkan password"
                required
                autocomplete="current-password"
              >
              <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="form-error" id="loginPasswordError"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span>Masuk</span>
          </button>

          <div class="divider">atau</div>

          <button type="button" class="btn btn-whatsapp" onclick="contactAdmin()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span>Pertanyaan? Hubungi Admin</span>
          </button>

          <div class="auth-footer">
            <a class="auth-link" onclick="openForgotPassword()">Lupa Password?</a>
          </div>
        </form>

        <!-- Register Form -->
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label class="form-label" for="registerName">Nama Lengkap</label>
            <input 
              type="text" 
              class="form-input" 
              id="registerName" 
              placeholder="Masukkan nama lengkap"
              required
              autocomplete="name"
            >
            <div class="form-error" id="registerNameError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="registerEmail">Email</label>
            <input 
              type="email" 
              class="form-input" 
              id="registerEmail" 
              placeholder="nama@email.com"
              required
              autocomplete="email"
            >
            <div class="form-error" id="registerEmailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="registerPhone">Nomor Telepon</label>
            <div class="phone-input-group">
              <input 
                type="text" 
                class="form-input phone-prefix" 
                value="+62" 
                readonly
              >
              <input 
                type="tel" 
                class="form-input" 
                id="registerPhone" 
                placeholder="812-xxxx-xxxx"
                required
                autocomplete="tel"
              >
            </div>
            <div class="form-hint">Format: 812-3456-7890 (tanpa +62)</div>
            <div class="form-error" id="registerPhoneError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="registerPassword">Password</label>
            <div class="password-wrapper">
              <input 
                type="password" 
                class="form-input" 
                id="registerPassword" 
                placeholder="Minimal 8 karakter"
                required
                autocomplete="new-password"
                minlength="8"
              >
              <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="form-error" id="registerPasswordError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="registerPasswordConfirm">Konfirmasi Password</label>
            <div class="password-wrapper">
              <input 
                type="password" 
                class="form-input" 
                id="registerPasswordConfirm" 
                placeholder="Ulangi password"
                required
                autocomplete="new-password"
              >
              <button type="button" class="password-toggle" onclick="togglePassword('registerPasswordConfirm', this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="form-error" id="registerPasswordConfirmError"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn">
            <span>Daftar Sekarang</span>
          </button>

          <div class="auth-footer">
            Sudah punya akun? <a class="auth-link" onclick="switchTab('login')">Masuk</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgotPasswordModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title font-display">Lupa Password</h3>
      </div>
      <div class="modal-body">
        <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
          Masukkan email yang terdaftar. Kami akan mengirimkan link untuk reset password.
        </p>
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label" for="forgotEmail">Email</label>
          <input 
            type="email" 
            class="form-input" 
            id="forgotEmail" 
            placeholder="nama@email.com"
            required
          >
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeForgotPassword()">Batal</button>
        <button type="button" class="btn btn-primary" onclick="submitForgotPassword()">
          <span>Kirim Link</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // STATE MANAGEMENT
    // ==========================================
    
    // Simulated database (will be replaced with Supabase)
    const simulatedUsers = [
      {
        id: '1',
        name: 'Admin Demo',
        email: 'admin@demo.com',
        phone: '+6281234567890',
        password: 'demo1234',
        isActive: true,
        balance: 50000,
        createdAt: new Date().toISOString()
      }
    ];

    // ==========================================
    // TAB SWITCHING
    // ==========================================
    
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        switchTab(targetTab);
      });
    });

    function switchTab(targetTab) {
      // Update tabs
      tabs.forEach(t => {
        t.classList.toggle('active', t.dataset.tab === targetTab);
      });
      
      // Update forms
      forms.forEach(f => {
        f.classList.toggle('active', f.id === targetTab + 'Form');
      });
      
      // Clear alerts
      hideAllAlerts();
    }

    // ==========================================
    // PASSWORD TOGGLE
    // ==========================================
    
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      
      input.type = isPassword ? 'text' : 'password';
      
      button.innerHTML = isPassword 
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    // ==========================================
    // ALERTS
    // ==========================================
    
    function showAlert(type, message) {
      hideAllAlerts();
      
      const alertEl = document.getElementById('alert' + type.charAt(0).toUpperCase() + type.slice(1));
      alertEl.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${type === 'error' ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' : ''}
          ${type === 'warning' ? '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' : ''}
          ${type === 'success' ? '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' : ''}
        </svg>
        <span>${message}</span>
      `;
      alertEl.classList.add('show');
    }

    function hideAllAlerts() {
      document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
    }

    // ==========================================
    // FORM VALIDATION
    // ==========================================
    
    function showError(inputId, message) {
      const input = document.getElementById(inputId);
      const errorEl = document.getElementById(inputId + 'Error');
      
      input.classList.add('error');
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function clearError(inputId) {
      const input = document.getElementById(inputId);
      const errorEl = document.getElementById(inputId + 'Error');
      
      if (input) input.classList.remove('error');
      if (errorEl) {
        errorEl.textContent = '';
        errorEl.classList.remove('show');
      }
    }

    function clearAllErrors() {
      document.querySelectorAll('.form-input').forEach(input => input.classList.remove('error'));
      document.querySelectorAll('.form-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    // ==========================================
    // LOGIN FORM
    // ==========================================
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAllErrors();
      hideAllAlerts();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      // Validation
      let hasError = false;
      
      if (!email) {
        showError('loginEmail', 'Email wajib diisi');
        hasError = true;
      } else if (!isValidEmail(email)) {
        showError('loginEmail', 'Format email tidak valid');
        hasError = true;
      }

      if (!password) {
        showError('loginPassword', 'Password wajib diisi');
        hasError = true;
      }

      if (hasError) return;

      // Show loading
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>Memproses...</span>';

      // Simulate API call
      await simulateDelay(1000);

      // Check if user exists
      const user = simulatedUsers.find(u => u.email === email);

      if (!user) {
        showAlert('error', 'Email belum terdaftar. Silakan daftar terlebih dahulu.');
        btn.disabled = false;
        btn.innerHTML = '<span>Masuk</span>';
        return;
      }

      if (user.password !== password) {
        showAlert('error', 'Password salah. Silakan coba lagi.');
        btn.disabled = false;
        btn.innerHTML = '<span>Masuk</span>';
        return;
      }

      // Success
      showAlert('success', 'Login berhasil! Mengalihkan...');
      
      // Store session (will be replaced with Supabase session)
      localStorage.setItem('currentUser', JSON.stringify(user));

      // Redirect to dashboard
      setTimeout(() => {
        alert('Redirect ke Dashboard (akan dibuat di Section berikutnya)');
        // window.location.href = 'dashboard.html';
      }, 1500);
    });

    // ==========================================
    // REGISTER FORM
    // ==========================================
    
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAllErrors();
      hideAllAlerts();

      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const phone = document.getElementById('registerPhone').value.trim();
      const password = document.getElementById('registerPassword').value;
      const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
      const btn = document.getElementById('registerBtn');

      // Validation
      let hasError = false;

      if (!name) {
        showError('registerName', 'Nama lengkap wajib diisi');
        hasError = true;
      } else if (name.length < 3) {
        showError('registerName', 'Nama minimal 3 karakter');
        hasError = true;
      }

      if (!email) {
        showError('registerEmail', 'Email wajib diisi');
        hasError = true;
      } else if (!isValidEmail(email)) {
        showError('registerEmail', 'Format email tidak valid');
        hasError = true;
      }

      if (!phone) {
        showError('registerPhone', 'Nomor telepon wajib diisi');
        hasError = true;
      } else if (!isValidPhone(phone)) {
        showError('registerPhone', 'Format nomor telepon tidak valid');
        hasError = true;
      }

      if (!password) {
        showError('registerPassword', 'Password wajib diisi');
        hasError = true;
      } else if (password.length < 8) {
        showError('registerPassword', 'Password minimal 8 karakter');
        hasError = true;
      }

      if (!passwordConfirm) {
        showError('registerPasswordConfirm', 'Konfirmasi password wajib diisi');
        hasError = true;
      } else if (password !== passwordConfirm) {
        showError('registerPasswordConfirm', 'Password tidak cocok');
        hasError = true;
      }

      if (hasError) return;

      // Show loading
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>Memproses...</span>';

      // Simulate API call
      await simulateDelay(1500);

      // Check if email already exists
      const existingUser = simulatedUsers.find(u => u.email === email);

      if (existingUser) {
        showAlert('warning', 'Email sudah terdaftar. Silakan login.');
        btn.disabled = false;
        btn.innerHTML = '<span>Daftar Sekarang</span>';
        
        // Switch to login after 2 seconds
        setTimeout(() => {
          switchTab('login');
          document.getElementById('loginEmail').value = email;
        }, 2000);
        return;
      }

      // Create new user
      const newUser = {
        id: Date.now().toString(),
        name: name,
        email: email,
        phone: '+62' + phone.replace(/[^0-9]/g, ''),
        password: password,
        isActive: false, // Needs admin activation
        balance: 0,
        createdAt: new Date().toISOString()
      };

      simulatedUsers.push(newUser);

      // Success
      showAlert('success', 'Pendaftaran berhasil! Silakan hubungi admin untuk aktivasi akun.');
      btn.disabled = false;
      btn.innerHTML = '<span>Daftar Sekarang</span>';

      // Clear form
      this.reset();

      // Switch to login after 3 seconds
      setTimeout(() => {
        switchTab('login');
      }, 3000);
    });

    // ==========================================
    // FORGOT PASSWORD
    // ==========================================
    
    function openForgotPassword() {
      document.getElementById('forgotPasswordModal').classList.add('active');
      document.getElementById('forgotEmail').focus();
    }

    function closeForgotPassword() {
      document.getElementById('forgotPasswordModal').classList.remove('active');
      document.getElementById('forgotEmail').value = '';
    }

    async function submitForgotPassword() {
      const email = document.getElementById('forgotEmail').value.trim();
      
      if (!email) {
        alert('Masukkan email Anda');
        return;
      }

      if (!isValidEmail(email)) {
        alert('Format email tidak valid');
        return;
      }

      // Simulate sending reset email
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>Mengirim...</span>';

      await simulateDelay(1500);

      // Check if email exists
      const user = simulatedUsers.find(u => u.email === email);
      
      closeForgotPassword();
      
      if (user) {
        showAlert('success', 'Link reset password telah dikirim ke email Anda.');
      } else {
        showAlert('warning', 'Email tidak ditemukan, tetapi jika email terdaftar, link akan dikirim.');
      }

      btn.disabled = false;
      btn.innerHTML = '<span>Kirim Link</span>';
    }

    // Close modal on overlay click
    document.getElementById('forgotPasswordModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeForgotPassword();
      }
    });

    // ==========================================
    // CONTACT ADMIN
    // ==========================================
    
    function contactAdmin() {
      const adminPhone = '6285161990373';
      const message = encodeURIComponent('Halo Admin, saya membutuhkan bantuan terkait akun Message Platform. Terima kasih.');
      const waUrl = `https://wa.me/${adminPhone}?text=${message}`;
      window.open(waUrl, '_blank');
    }

    // ==========================================
    // HELPER FUNCTIONS
    // ==========================================
    
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function isValidPhone(phone) {
      const cleanPhone = phone.replace(/[^0-9]/g, '');
      return cleanPhone.length >= 9 && cleanPhone.length <= 13;
    }

    function simulateDelay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ==========================================
    // KEYBOARD SHORTCUTS
    // ==========================================
    
    document.addEventListener('keydown', function(e) {
      // ESC to close modal
      if (e.key === 'Escape') {
        closeForgotPassword();
      }
    });

    // ==========================================
    // INPUT FORMATTING
    // ==========================================
    
    // Format phone number as user types
    document.getElementById('registerPhone').addEventListener('input', function(e) {
      let value = e.target.value.replace(/[^0-9]/g, '');
      
      // Limit to 12 digits
      if (value.length > 12) {
        value = value.substring(0, 12);
      }
      
      // Format: 812-3456-7890
      if (value.length > 6) {
        value = value.substring(0, 3) + '-' + value.substring(3, 7) + '-' + value.substring(7);
      } else if (value.length > 3) {
        value = value.substring(0, 3) + '-' + value.substring(3);
      }
      
      e.target.value = value;
    });

    // Clear error on input focus
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', function() {
        clearError(this.id);
      });
    });
  </script>
</body>
</html>
